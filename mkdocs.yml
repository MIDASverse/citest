site_name: citest
site_url: https://midasverse.github.io/citest/
site_description: Conditional independence testing for missing data
repo_url: https://github.com/MIDASverse/citest
repo_name: MIDASverse/citest

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - How It Works: methodology.md
  - Examples: examples.md
  - API Reference:
      - CIMissTest: api/cimisstest.md
      - Dataset: api/dataset.md
      - Imputers: api/imputers.md
      - Classifiers: api/classifiers.md
      - Data Generators: api/data-generators.md
      - Kappa Utilities: api/kappa.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            merge_init_into_class: true
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
